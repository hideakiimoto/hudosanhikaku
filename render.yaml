services:
  - type: web
    name: hudosanhikaku-api
    runtime: python
    region: singapore
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: REINFOLIB_API_KEY
        sync: false           # Render Dashboard で手動設定
      - key: ESTAT_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false           # デプロイ後に GitHub Pages の URL を設定
    healthCheckPath: /health
